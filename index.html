<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wso practice</title>
  <style>
    body {
      margin: 0;
      padding: 2rem 1.5rem 4rem;
      font-family: "Cormorant Garamond", serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    main {
      width: min(26rem, 100%);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
      text-transform: lowercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    .subtitle {
      font-size: 1rem;
      color: #999;
      margin-bottom: 1.5rem;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 0.75rem;
    }

    a {
      color: inherit;
      text-decoration: none;
      padding: 0.4rem 0.5rem 0.4rem 0;
      display: block;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    a:hover,
    a:focus {
      color: #d8d8ff;
      border-color: rgba(216, 216, 255, 0.4);
    }

    .empty {
      color: #666;
      font-size: 1.2rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>wayzata symphony orchestra</h1>
    <p class="subtitle">practice pages</p>
    <ul id="song-list"></ul>
  </main>

  <script>
    fetch('songs.json')
      .then(r => r.json())
      .then(songs => {
        const list = document.getElementById('song-list');
        const entries = Object.entries(songs).sort((a, b) =>
          a[1].title.localeCompare(b[1].title)
        );

        if (entries.length === 0) {
          const p = document.createElement('p');
          p.className = 'empty';
          p.textContent = 'songs coming soon';
          list.parentNode.appendChild(p);
          return;
        }

        entries.forEach(([slug, song]) => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = 'song.html?s=' + encodeURIComponent(slug);
          a.textContent = song.title;
          li.appendChild(a);
          list.appendChild(li);
        });
      });
  </script>
</body>
</html>
