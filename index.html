<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wso practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Cormorant Garamond", serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── header ── */
    header {
      width: 100%;
      padding: 4rem 2rem 3rem;
      text-align: center;
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(24rem, 60%);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    .feather-icon {
      width: 2.5rem;
      height: 2.5rem;
      margin-top: 1.2rem;
      opacity: 0;
      transform: translateY(-20rem) rotate(-15deg);
      animation: featherIn 3s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
    }

    .feather-icon.glow {
      animation: featherIn 3s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards,
                 goldenGlow 2s ease forwards;
    }

    @keyframes goldenGlow {
      0% {
        filter: none;
      }
      25% {
        filter: brightness(1.8) drop-shadow(0 0 6px rgba(255, 210, 80, 0.9)) drop-shadow(0 0 20px rgba(255, 190, 50, 0.5));
      }
      50% {
        filter: brightness(1.2) sepia(0.6) hue-rotate(5deg) saturate(3) drop-shadow(0 0 10px rgba(255, 180, 40, 0.6));
      }
      100% {
        filter: brightness(0.4) sepia(1) hue-rotate(-10deg) saturate(10);
      }
    }

    @keyframes featherIn {
      0% {
        opacity: 0;
        transform: translateY(-20rem) rotate(-15deg);
      }
      15% {
        opacity: 1;
      }
      50% {
        transform: translateY(-0.5rem) rotate(3deg);
      }
      75% {
        transform: translateY(0.15rem) rotate(-1deg);
      }
      100% {
        opacity: 0.7;
        transform: translateY(0) rotate(0deg);
      }
    }

    h1 {
      margin: 0;
      font-size: 2.4rem;
      font-weight: 300;
      text-transform: lowercase;
      letter-spacing: 0.12em;
      opacity: 0;
      animation: fadeUp 1s ease 0.1s forwards;
    }

    .subtitle {
      font-size: 1.05rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.4);
      margin: 0.4rem 0 0;
      letter-spacing: 0.15em;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(0.6rem);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── main content ── */
    main {
      width: min(28rem, 100%);
      padding: 2rem 2rem 5rem;
    }

    /* ── concert section ── */
    .concert {
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    .concert-header {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 1.2rem;
    }

    .concert-name {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: lowercase;
      color: #fff;
      margin: 0;
    }

    .concert-date {
      font-size: 0.85rem;
      font-weight: 300;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    /* ── song list ── */
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      position: relative;
    }

    li + li {
      margin-top: 0.15rem;
    }

    a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      display: block;
      padding: 0.65rem 0.8rem;
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      border-left: 2px solid transparent;
      transition: all 0.3s ease;
      position: relative;
    }

    a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0.8rem;
      right: 0;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    a:hover,
    a:focus {
      color: #fff;
      border-left-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.03);
    }

    a:hover::after {
      background: rgba(255,255,255,0.1);
    }

    .composer {
      color: rgba(255,255,255,0.35);
      font-weight: 300;
    }

    /* ── empty state ── */
    .empty {
      color: rgba(255,255,255,0.25);
      font-size: 1.2rem;
      font-style: italic;
      text-align: center;
      margin-top: 3rem;
    }

    /* ── footer ── */
    footer {
      width: 100%;
      text-align: center;
      padding: 0 2rem 2.5rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.1em;
    }

    /* ── responsive ── */
    @media (min-width: 600px) {
      header {
        padding: 5rem 2rem 3.5rem;
      }

      h1 {
        font-size: 2.8rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>wayzata symphony orchestra</h1>
    <p class="subtitle">practice pages</p>
    <img src="feather.svg" alt="" class="feather-icon">
  </header>

  <main id="concerts"></main>

  <footer>wso</footer>

  <script>
    setTimeout(() => {
      const f = document.querySelector('.feather-icon');
      if (f) f.classList.add('glow');
    }, 20000);
  </script>

  <script>
    fetch('songs.json')
      .then(r => r.json())
      .then(songs => {
        const container = document.getElementById('concerts');
        const entries = Object.entries(songs);

        if (entries.length === 0) {
          const p = document.createElement('p');
          p.className = 'empty';
          p.textContent = 'songs coming soon';
          container.appendChild(p);
          return;
        }

        // Group by concert
        const concerts = {};
        entries.forEach(([slug, song]) => {
          const concert = song.concert || 'uncategorized';
          if (!concerts[concert]) concerts[concert] = [];
          concerts[concert].push([slug, song]);
        });

        // Concert display names and dates
        const concertMeta = {
          'transformations': { name: 'transformations', date: 'may 8, 2026' },
        };

        let delay = 0.5;
        for (const [concert, songs] of Object.entries(concerts)) {
          const section = document.createElement('div');
          section.className = 'concert';
          section.style.animationDelay = delay + 's';
          delay += 0.15;

          const header = document.createElement('div');
          header.className = 'concert-header';

          const meta = concertMeta[concert];
          const h2 = document.createElement('h2');
          h2.className = 'concert-name';
          h2.textContent = meta ? meta.name : concert;
          header.appendChild(h2);

          if (meta && meta.date) {
            const dateSpan = document.createElement('span');
            dateSpan.className = 'concert-date';
            dateSpan.textContent = meta.date;
            header.appendChild(dateSpan);
          }

          section.appendChild(header);

          const ul = document.createElement('ul');
          songs.sort((a, b) => a[1].title.localeCompare(b[1].title));
          songs.forEach(([slug, song]) => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = 'song.html?s=' + encodeURIComponent(slug);

            // Split composer and piece name on the em dash
            const parts = song.title.split(' — ');
            if (parts.length === 2) {
              const composerSpan = document.createElement('span');
              composerSpan.className = 'composer';
              composerSpan.textContent = parts[0] + '  ';
              a.appendChild(composerSpan);
              a.appendChild(document.createTextNode(parts[1]));
            } else {
              a.textContent = song.title;
            }

            li.appendChild(a);
            ul.appendChild(li);
          });

          section.appendChild(ul);
          container.appendChild(section);
        }
      });
  </script>
</body>
</html>
