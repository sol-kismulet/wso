<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wso practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header>
    <h1>wayzata symphony orchestra</h1>
    <p class="subtitle">practice pages</p>
    <img src="feather.svg" alt="" class="feather-icon">
  </header>

  <main id="concerts"></main>

  <footer>wso</footer>

  <script>
    setTimeout(() => {
      const f = document.querySelector('.feather-icon');
      if (f) f.classList.add('glow');
    }, 20000);
  </script>

  <script>
    fetch('songs.json')
      .then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      })
      .then(data => {
        const container = document.getElementById('concerts');
        const concertMeta = data.concerts || {};
        const entries = Object.entries(data.songs || {});

        if (entries.length === 0) {
          const p = document.createElement('p');
          p.className = 'empty';
          p.textContent = 'songs coming soon';
          container.appendChild(p);
          return;
        }

        // Group by concert
        const concerts = {};
        entries.forEach(([slug, song]) => {
          const concert = song.concert || 'uncategorized';
          if (!concerts[concert]) concerts[concert] = [];
          concerts[concert].push([slug, song]);
        });

        let delay = 0.5;
        for (const [concert, songs] of Object.entries(concerts)) {
          const section = document.createElement('div');
          section.className = 'concert';
          section.style.animationDelay = delay + 's';
          delay += 0.15;

          const header = document.createElement('div');
          header.className = 'concert-header';

          const meta = concertMeta[concert];
          const h2 = document.createElement('h2');
          h2.className = 'concert-name';
          h2.textContent = meta ? meta.name : concert;
          header.appendChild(h2);

          if (meta && meta.date) {
            const dateSpan = document.createElement('span');
            dateSpan.className = 'concert-date';
            dateSpan.textContent = meta.date;
            header.appendChild(dateSpan);
          }

          section.appendChild(header);

          const ul = document.createElement('ul');
          songs.sort((a, b) => a[1].title.localeCompare(b[1].title));
          songs.forEach(([slug, song]) => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = 'song.html?s=' + encodeURIComponent(slug);

            // Split composer and piece name on the em dash
            const parts = song.title.split(' — ');
            if (parts.length === 2) {
              const composerSpan = document.createElement('span');
              composerSpan.className = 'composer';
              composerSpan.textContent = parts[0] + '  ';
              a.appendChild(composerSpan);
              a.appendChild(document.createTextNode(parts[1]));
            } else {
              a.textContent = song.title;
            }

            li.appendChild(a);
            ul.appendChild(li);
          });

          section.appendChild(ul);
          container.appendChild(section);
        }
      })
      .catch(() => {
        const container = document.getElementById('concerts');
        const p = document.createElement('p');
        p.className = 'empty';
        p.textContent = 'failed to load songs';
        container.appendChild(p);
      });
  </script>
</body>
</html>
