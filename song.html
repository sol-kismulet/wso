<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>loading…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="song.css">
  <style>
    #video-wrapper {
      width: min(560px, 90vw);
      aspect-ratio: 16 / 9;
      background: #111;
    }
    #video-wrapper iframe {
      width: 100%;
      height: 100%;
    }
    .back {
      position: fixed;
      top: 1rem;
      left: 1rem;
      font-size: 1rem;
      color: #666;
      text-decoration: none;
    }
    .back:hover {
      color: #d8d8ff;
    }
    .loop-label {
      width: 100%;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.08em;
      font-style: italic;
      margin: 0.6rem 0 0.2rem;
      text-align: left;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← back</a>

  <div class="title">
    <span id="song-title">loading…</span>
    <img src="feather.svg" alt="feather" class="feather">
  </div>

  <div id="video-wrapper">
    <div id="player"></div>
  </div>

  <div class="controls">
    <div id="loops"></div>
    <div>
      <button id="add-loop">+</button>
    </div>
    <div>
      <label class="speed-label">speed <span id="speed-display">1x</span></label>
      <input id="speed" type="range" min="0.25" max="2" step="0.25" value="1">
    </div>
    <div>
      <button id="play-btn">play piece</button>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('s');

    if (!slug) {
      document.getElementById('song-title').textContent = 'no song specified';
    } else {
      init(slug);
    }

    function init(slug) {
      let player;
      let playerReady = false;
      let loopActive = false;
      let playActive = false;
      let currentLoopIndex = null;
      let loops = [];

      const loopsContainer = document.getElementById('loops');
      const addLoopBtn = document.getElementById('add-loop');
      const playBtn = document.getElementById('play-btn');
      const speedInput = document.getElementById('speed');
      const speedDisplay = document.getElementById('speed-display');

      function parseTime(t) {
        const parts = t.split(':');
        if (parts.length === 1) return parseFloat(parts[0]) || 0;
        return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
      }

      function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      }

      function createLoopElement(startVal, endVal, label) {
        const div = document.createElement('div');
        div.className = 'loop';

        if (label) {
          const labelDiv = document.createElement('div');
          labelDiv.className = 'loop-label';
          labelDiv.textContent = label;
          div.appendChild(labelDiv);
        }

        const startLabel = document.createElement('label');
        startLabel.textContent = 'start ';
        const startInput = document.createElement('input');
        startInput.type = 'text';
        startInput.className = 'start';
        startInput.value = startVal;
        startLabel.appendChild(startInput);

        const endLabel = document.createElement('label');
        endLabel.textContent = 'end ';
        const endInput = document.createElement('input');
        endInput.type = 'text';
        endInput.className = 'end';
        endInput.value = endVal;
        endLabel.appendChild(endInput);

        const btn = document.createElement('button');
        btn.textContent = 'loop section';
        btn.className = 'loop-btn';
        const index = loops.length;
        btn.addEventListener('click', () => handleLoopButton(index));

        div.appendChild(startLabel);
        div.appendChild(endLabel);
        div.appendChild(btn);
        loopsContainer.appendChild(div);

        loops.push({ start: startInput, end: endInput, button: btn });
      }

      function stopLoop() {
        if (currentLoopIndex !== null) {
          loops[currentLoopIndex].button.textContent = 'loop section';
        }
        if (player && loopActive) {
          player.pauseVideo();
        }
        loopActive = false;
        currentLoopIndex = null;
      }

      function startLoop(i) {
        if (!playerReady) return;
        playActive = false;
        playBtn.textContent = 'play piece';
        player.pauseVideo();
        currentLoopIndex = i;
        const start = parseTime(loops[i].start.value);
        player.seekTo(start, true);
        player.playVideo();
        loops[i].button.textContent = 'stop';
        loopActive = true;
      }

      function checkLoop() {
        if (!loopActive || currentLoopIndex === null) return;
        const end = parseTime(loops[currentLoopIndex].end.value);
        if (player.getCurrentTime() >= end) {
          player.seekTo(parseTime(loops[currentLoopIndex].start.value), true);
        }
      }

      function handleLoopButton(i) {
        if (loopActive && currentLoopIndex === i) {
          stopLoop();
        } else {
          stopLoop();
          startLoop(i);
        }
      }

      addLoopBtn.addEventListener('click', () => {
        if (loops.length === 0) return;
        const last = loops[loops.length - 1];
        const startVal = last.end.value;
        const startSec = parseTime(startVal);
        createLoopElement(startVal, formatTime(startSec + 10));
      });

      playBtn.addEventListener('click', () => {
        if (!playerReady) return;
        if (!playActive) {
          stopLoop();
          player.seekTo(0, true);
          player.playVideo();
          playBtn.textContent = 'stop';
          playActive = true;
        } else {
          player.pauseVideo();
          playBtn.textContent = 'play piece';
          playActive = false;
        }
      });

      speedInput.addEventListener('input', () => {
        if (!playerReady) return;
        const r = parseFloat(speedInput.value);
        player.setPlaybackRate(r);
        speedDisplay.textContent = r.toFixed(2) + 'x';
      });

      // Load song data and initialize
      fetch('songs.json')
        .then(r => r.json())
        .then(data => {
          const song = (data.songs || {})[slug];
          if (!song) {
            document.getElementById('song-title').textContent = 'song not found';
            return;
          }

          document.title = song.title;
          document.getElementById('song-title').textContent = song.title;

          // Build loop elements from JSON
          song.loops.forEach((loop) => {
            const start = Array.isArray(loop) ? loop[0] : loop.start;
            const end = Array.isArray(loop) ? loop[1] : loop.end;
            const label = Array.isArray(loop) ? null : loop.label;
            createLoopElement(start, end, label);
          });

          // Initialize YouTube player
          window.onYouTubeIframeAPIReady = function () {
            player = new YT.Player('player', {
              width: '100%',
              height: '100%',
              videoId: song.videoId,
              playerVars: {
                origin: window.location.origin,
                rel: 0
              },
              events: {
                onReady: () => {
                  playerReady = true;
                },
                onStateChange: (event) => {
                  clearInterval(loopTimer);
                  if (event.data === YT.PlayerState.PLAYING) {
                    loopTimer = setInterval(checkLoop, 200);
                  }
                }
              }
            });
          };

          let loopTimer = null;

          // If the API already loaded before our callback was set
          if (window.YT && window.YT.Player) {
            window.onYouTubeIframeAPIReady();
          }
        })
        .catch(err => {
          console.error('Failed to load songs.json:', err);
          document.getElementById('song-title').textContent = 'failed to load';
        });
    }
  </script>
</body>
</html>
