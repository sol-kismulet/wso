<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>polyrhythm practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="song.css">
  <style>
    .back {
      position: fixed;
      top: 1rem;
      left: 1rem;
      font-size: 1rem;
      color: #666;
      text-decoration: none;
    }
    .back:hover {
      color: #d8d8ff;
    }
    .subtitle {
      font-size: 1rem;
      font-style: italic;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-top: -1rem;
    }
    .beat-row {
      display: flex;
      gap: 1rem;
      align-items: center;
      justify-content: center;
      margin: 0.5rem 0;
    }
    .beat-row-label {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      width: 2em;
      text-align: right;
    }
    .beat {
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      border: 1px solid #666;
      transition: background 0.05s, border-color 0.05s;
    }
    .beat.layer4 {
      border-color: #8cb4d8;
    }
    .beat.layer4.active {
      background: #8cb4d8;
      border-color: #8cb4d8;
    }
    .beat.layer3 {
      border-color: #d8a08c;
    }
    .beat.layer3.active {
      background: #d8a08c;
      border-color: #d8a08c;
    }
    .controls {
      margin-top: 1.5rem;
    }
    .layer-config {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }
    .layer-config-label {
      font-size: 1rem;
      width: 2em;
      text-align: right;
      color: rgba(255,255,255,0.5);
    }
    .layer-config-label.l4 { color: #8cb4d8; }
    .layer-config-label.l3 { color: #d8a08c; }
    .sound-btn {
      font-size: 0.85rem;
      padding: 0.3em 0.7em;
      color: #666;
      border-color: #444;
    }
    .sound-btn.active {
      color: #fff;
      border-color: #fff;
    }
    .sound-btn.muted {
      color: #444;
      border-color: #333;
      text-decoration: line-through;
    }
    .mute-btn {
      font-size: 0.85rem;
      padding: 0.3em 0.5em;
      color: #666;
      border-color: #444;
    }
    .mute-btn.muted {
      color: #c66;
      border-color: #c66;
    }
    .tempo-display {
      font-size: 1.4rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← back</a>

  <div class="title">
    <span>polyrhythm</span>
    <img src="feather.svg" alt="" class="feather">
  </div>
  <p class="subtitle">3 against 4 — mahler 2, m. 250</p>

  <div class="beat-row">
    <span class="beat-row-label">4</span>
    <div class="beat layer4" id="b4-0"></div>
    <div class="beat layer4" id="b4-1"></div>
    <div class="beat layer4" id="b4-2"></div>
    <div class="beat layer4" id="b4-3"></div>
  </div>
  <div class="beat-row">
    <span class="beat-row-label">3</span>
    <div class="beat layer3" id="b3-0"></div>
    <div class="beat layer3" id="b3-1"></div>
    <div class="beat layer3" id="b3-2"></div>
  </div>

  <div class="controls">
    <div class="layer-config" id="config4"></div>
    <div class="layer-config" id="config3"></div>
    <div style="margin-top:1rem; text-align:center;">
      <div class="tempo-display"><span id="bpm-display">80</span> bpm</div>
      <input id="bpm" type="range" min="40" max="200" step="1" value="80">
    </div>
    <div style="text-align:center; margin-top:1rem;">
      <button id="start-btn">start</button>
    </div>
  </div>

  <script>
    const voices = {
      click:    { name: 'click',    wave: 'square',   freq: 800,  gain: 0.3, decay: 0.05 },
      high:     { name: 'high',     wave: 'square',   freq: 1400, gain: 0.25, decay: 0.04 },
      bell:     { name: 'bell',     wave: 'sine',     freq: 523,  gain: 0.4, decay: 0.3 },
      low:      { name: 'low',      wave: 'sine',     freq: 262,  gain: 0.4, decay: 0.2 },
      snap:     { name: 'snap',     wave: 'triangle', freq: 2000, gain: 0.25, decay: 0.03 },
      drum:     { name: 'drum',     wave: 'square',   freq: 200,  gain: 0.4, decay: 0.08 }
    };

    let audioCtx = null;
    let compressor = null;
    let layer4Node = null;
    let layer3Node = null;
    let buffers = {};
    let playing = false;
    let bpm = 80;
    let schedulerTimeout = null;
    let animFrame = null;
    let layer4Voice = 'low';
    let layer3Voice = 'high';
    let layer4Muted = false;
    let layer3Muted = false;

    let nextBeat4Time = 0;
    let nextBeat3Time = 0;
    let currentBeat4 = 0;
    let currentBeat3 = 0;
    let lastBeat4Time = 0;
    let lastBeat3Time = 0;
    let displayBeat4 = -1;
    let displayBeat3 = -1;

    const SCHEDULE_AHEAD = 0.5;

    const startBtn = document.getElementById('start-btn');
    const bpmSlider = document.getElementById('bpm');
    const bpmDisplay = document.getElementById('bpm-display');

    function renderBuffer(voice) {
      const sr = audioCtx.sampleRate;
      const len = Math.ceil(sr * (voice.decay + 0.02));
      const buf = audioCtx.createBuffer(1, len, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        const t = i / sr;
        const phase = voice.freq * t * 2 * Math.PI;
        let sample;
        if (voice.wave === 'sine') sample = Math.sin(phase);
        else if (voice.wave === 'square') sample = Math.sin(phase) >= 0 ? 1 : -1;
        else sample = 2 * Math.abs(2 * (t * voice.freq % 1) - 1) - 1;
        const env = t < voice.decay
          ? voice.gain * Math.pow(0.001 / voice.gain, t / voice.decay)
          : 0;
        data[i] = sample * env;
      }
      return buf;
    }

    function initAudio() {
      audioCtx = new AudioContext();
      compressor = audioCtx.createDynamicsCompressor();
      compressor.threshold.value = -6;
      compressor.knee.value = 10;
      compressor.ratio.value = 4;
      compressor.connect(audioCtx.destination);

      layer4Node = audioCtx.createGain();
      layer4Node.gain.value = 1.0;
      layer4Node.connect(compressor);

      layer3Node = audioCtx.createGain();
      layer3Node.gain.value = 1.0;
      layer3Node.connect(compressor);

      Object.keys(voices).forEach(key => {
        buffers[key] = renderBuffer(voices[key]);
      });
    }

    function playBuffer(key, time, dest) {
      const src = audioCtx.createBufferSource();
      src.buffer = buffers[key];
      src.connect(dest);
      src.start(time);
    }

    function buildLayerConfig(containerId, labelClass, defaultKey, onSelect, onMute) {
      const container = document.getElementById(containerId);

      const label = document.createElement('span');
      label.className = 'layer-config-label ' + labelClass;
      label.textContent = labelClass === 'l4' ? '4' : '3';
      container.appendChild(label);

      const btns = {};
      Object.keys(voices).forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'sound-btn' + (key === defaultKey ? ' active' : '');
        btn.textContent = voices[key].name;
        btn.addEventListener('click', () => {
          Object.values(btns).forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          onSelect(key);
          if (!audioCtx) initAudio();
          if (audioCtx.state === 'suspended') audioCtx.resume();
          playBuffer(key, audioCtx.currentTime, compressor);
        });
        btns[key] = btn;
        container.appendChild(btn);
      });

      const muteBtn = document.createElement('button');
      muteBtn.className = 'mute-btn';
      muteBtn.textContent = 'mute';
      muteBtn.addEventListener('click', () => {
        const muted = onMute();
        muteBtn.classList.toggle('muted', muted);
      });
      container.appendChild(muteBtn);
    }

    buildLayerConfig('config4', 'l4', 'low',
      key => { layer4Voice = key; },
      () => { layer4Muted = !layer4Muted; return layer4Muted; }
    );
    buildLayerConfig('config3', 'l3', 'high',
      key => { layer3Voice = key; },
      () => { layer3Muted = !layer3Muted; return layer3Muted; }
    );

    function highlightBeat(layer, index, count) {
      for (let i = 0; i < count; i++) {
        const el = document.getElementById('b' + layer + '-' + i);
        if (i === index) el.classList.add('active');
        else el.classList.remove('active');
      }
    }

    function scheduler() {
      const measureDuration = (60 / bpm) * 4;
      const beat4Interval = 60 / bpm;
      const beat3Interval = measureDuration / 3;

      while (nextBeat4Time < audioCtx.currentTime + SCHEDULE_AHEAD) {
        if (!layer4Muted) playBuffer(layer4Voice, nextBeat4Time, layer4Node);
        lastBeat4Time = nextBeat4Time;
        displayBeat4 = currentBeat4;
        currentBeat4 = (currentBeat4 + 1) % 4;
        nextBeat4Time += beat4Interval;
      }

      while (nextBeat3Time < audioCtx.currentTime + SCHEDULE_AHEAD) {
        if (!layer3Muted) playBuffer(layer3Voice, nextBeat3Time, layer3Node);
        lastBeat3Time = nextBeat3Time;
        displayBeat3 = currentBeat3;
        currentBeat3 = (currentBeat3 + 1) % 3;
        nextBeat3Time += beat3Interval;
      }

      if (playing) schedulerTimeout = setTimeout(scheduler, 100);
    }

    function updateVisuals() {
      if (!playing) return;
      const now = audioCtx.currentTime;

      const beat4Interval = 60 / bpm;
      const measureDuration = beat4Interval * 4;
      const beat3Interval = measureDuration / 3;

      const timeSince4 = now - lastBeat4Time;
      highlightBeat(4, timeSince4 >= 0 && timeSince4 < beat4Interval * 0.5 ? displayBeat4 : -1, 4);

      const timeSince3 = now - lastBeat3Time;
      highlightBeat(3, timeSince3 >= 0 && timeSince3 < beat3Interval * 0.5 ? displayBeat3 : -1, 3);

      animFrame = requestAnimationFrame(updateVisuals);
    }

    function start() {
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      currentBeat4 = 0;
      currentBeat3 = 0;
      displayBeat4 = -1;
      displayBeat3 = -1;
      nextBeat4Time = audioCtx.currentTime + 0.1;
      nextBeat3Time = audioCtx.currentTime + 0.1;
      lastBeat4Time = 0;
      lastBeat3Time = 0;

      playing = true;
      scheduler();
      animFrame = requestAnimationFrame(updateVisuals);
      startBtn.textContent = 'stop';
    }

    function stop() {
      playing = false;
      clearTimeout(schedulerTimeout);
      cancelAnimationFrame(animFrame);
      startBtn.textContent = 'start';
      highlightBeat(4, -1, 4);
      highlightBeat(3, -1, 3);
    }

    startBtn.addEventListener('click', () => {
      if (!playing) start();
      else stop();
    });

    bpmSlider.addEventListener('input', () => {
      bpm = parseInt(bpmSlider.value, 10);
      bpmDisplay.textContent = bpm;
    });
  </script>
</body>
</html>
