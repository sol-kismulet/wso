<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>polyrhythm practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="song.css">
  <style>
    .back {
      position: fixed;
      top: 1rem;
      left: 1rem;
      font-size: 1rem;
      color: #666;
      text-decoration: none;
      z-index: 10;
    }
    .back:hover { color: #d8d8ff; }
    .under-construction {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-top: -0.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
    .ex-subtitle {
      font-size: 1rem;
      font-style: italic;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin: -0.5rem 0 0.8rem;
    }
    .beat-track {
      position: relative;
      width: min(400px, 80vw);
      height: 2.5rem;
      margin: 0.3rem auto;
    }
    .beat-track-label {
      position: absolute;
      left: -2.5em;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
    }
    .beat-track-label.l4 { color: #8cb4d8; }
    .beat-track-label.l3 { color: #d8a08c; }
    .dot {
      position: absolute;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      border: 1px solid #666;
      top: 50%;
      transform: translate(-50%, -50%);
      transition: background 0.05s, border-color 0.05s;
    }
    .dot.l4 { border-color: #8cb4d8; }
    .dot.l4.active { background: #8cb4d8; border-color: #8cb4d8; }
    .dot.l3 { border-color: #d8a08c; }
    .dot.l3.active { background: #d8a08c; border-color: #d8a08c; }
    .controls { margin-top: 1.5rem; }
    .layer-config {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }
    .layer-config-label {
      font-size: 1rem;
      width: 2em;
      text-align: right;
      color: rgba(255,255,255,0.5);
    }
    .layer-config-label.l4 { color: #8cb4d8; }
    .layer-config-label.l3 { color: #d8a08c; }
    .sound-btn {
      font-size: 0.85rem;
      padding: 0.3em 0.7em;
      color: #666;
      border-color: #444;
    }
    .sound-btn.active { color: #fff; border-color: #fff; }
    .mute-btn {
      font-size: 0.85rem;
      padding: 0.3em 0.5em;
      color: #666;
      border-color: #444;
    }
    .mute-btn.muted { color: #c66; border-color: #c66; }
    .tempo-display { font-size: 1.4rem; text-align: center; }
    .separator {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 2.5rem 0 1.5rem;
    }
    .ex-title {
      font-size: 2rem;
      text-align: center;
      font-family: "Cormorant Garamond", serif;
      font-weight: 300;
      margin: 0.5rem 0 0;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← back</a>

  <p class="under-construction">&#9888; under construction &#9888;</p>

  <div class="title">
    <span>rhythm practice</span>
    <img src="feather.svg" alt="" class="feather">
  </div>

  <!-- === Mahler 3-against-4 === -->
  <p class="ex-title">3 against 4</p>
  <p class="ex-subtitle">mahler 2, m. 250</p>

  <div class="beat-track" id="m-track4"></div>
  <div class="beat-track" id="m-track3"></div>

  <div class="controls">
    <div class="layer-config" id="m-config4"></div>
    <div class="layer-config" id="m-config3"></div>
    <div style="margin-top:1rem; text-align:center;">
      <div class="tempo-display"><span id="m-bpm-display">80</span> bpm</div>
      <input id="m-bpm" type="range" min="40" max="200" step="1" value="80">
    </div>
    <div style="text-align:center; margin-top:1rem;">
      <button id="m-start-btn">start</button>
    </div>
  </div>

  <hr class="separator">

  <!-- === Umoja m. 23 === -->
  <p class="ex-title">umoja m. 23</p>
  <p class="ex-subtitle">&#9833; + &#9833;. + &#9833;. against 4/4</p>

  <div class="beat-track" id="u-track4"></div>
  <div class="beat-track" id="u-track3"></div>

  <div class="controls">
    <div class="layer-config" id="u-config4"></div>
    <div class="layer-config" id="u-config3"></div>
    <div style="margin-top:1rem; text-align:center;">
      <div class="tempo-display"><span id="u-bpm-display">44</span> bpm</div>
      <input id="u-bpm" type="range" min="20" max="120" step="1" value="44">
    </div>
    <div style="text-align:center; margin-top:1rem;">
      <button id="u-start-btn">start</button>
    </div>
  </div>

  <script>
    // === Shared audio infrastructure ===
    const voices = {
      click: { name: 'click', wave: 'square', freq: 800, gain: 0.3, decay: 0.05 },
      high:  { name: 'high',  wave: 'square', freq: 1400, gain: 0.25, decay: 0.04 },
      bell:  { name: 'bell',  wave: 'sine',   freq: 523, gain: 0.4, decay: 0.3 },
      low:   { name: 'low',   wave: 'sine',   freq: 262, gain: 0.4, decay: 0.2 },
      snap:  { name: 'snap',  wave: 'triangle', freq: 2000, gain: 0.25, decay: 0.03 },
      drum:  { name: 'drum',  wave: 'square', freq: 200, gain: 0.4, decay: 0.08 }
    };

    let audioCtx = null;
    let layer4Node = null;
    let layer3Node = null;
    let previewNode = null;
    let buffers = {};
    let worker = null;
    let scheduledSources = [];
    const SCHEDULE_AHEAD = 0.12;

    function renderBuffer(voice) {
      const sr = audioCtx.sampleRate;
      const len = Math.ceil(sr * (voice.decay + 0.02));
      const buf = audioCtx.createBuffer(1, len, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        const t = i / sr;
        const phase = voice.freq * t * 2 * Math.PI;
        let sample;
        if (voice.wave === 'sine') sample = Math.sin(phase);
        else if (voice.wave === 'square') sample = Math.sin(phase) >= 0 ? 1 : -1;
        else sample = 2 * Math.abs(2 * (t * voice.freq % 1) - 1) - 1;
        const env = t < voice.decay ? voice.gain * Math.pow(0.001 / voice.gain, t / voice.decay) : 0;
        data[i] = sample * env;
      }
      return buf;
    }

    function initAudio() {
      audioCtx = new AudioContext();
      layer4Node = audioCtx.createGain();
      layer4Node.gain.value = 0.5;
      layer4Node.connect(audioCtx.destination);
      layer3Node = audioCtx.createGain();
      layer3Node.gain.value = 0.5;
      layer3Node.connect(audioCtx.destination);
      previewNode = audioCtx.createGain();
      previewNode.gain.value = 0.5;
      previewNode.connect(audioCtx.destination);
      Object.keys(voices).forEach(k => { buffers[k] = renderBuffer(voices[k]); });
      audioCtx.onstatechange = () => {
        if (audioCtx.state === 'interrupted' || audioCtx.state === 'suspended') {
          if (m.playing) m_stop();
          if (u.playing) u_stop();
        }
      };
    }

    function playBuffer(key, time, dest) {
      const src = audioCtx.createBufferSource();
      src.buffer = buffers[key];
      src.connect(dest);
      src.start(time);
      scheduledSources.push(src);
      src.onended = () => {
        const i = scheduledSources.indexOf(src);
        if (i >= 0) scheduledSources.splice(i, 1);
      };
    }

    function cancelScheduled() {
      scheduledSources.forEach(s => { try { s.stop(); } catch (e) {} });
      scheduledSources = [];
    }

    // Synth cello: sawtooth + detuned sawtooth → lowpass → gain envelope
    const CELLO_NOTES = [246.94, 196.00, 185.00]; // B3, G3, F#3
    const U_DURATIONS = [0.25, 0.375, 0.375]; // as fractions of measure

    function playCello(beatIndex, startTime, measureDur, dest) {
      const freq = CELLO_NOTES[beatIndex];
      const dur = U_DURATIONS[beatIndex] * measureDur;
      const attack = Math.min(0.08, dur * 0.1);
      const release = Math.min(0.15, dur * 0.2);

      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const filter = audioCtx.createBiquadFilter();
      const env = audioCtx.createGain();

      osc1.type = 'sawtooth';
      osc1.frequency.value = freq;
      osc2.type = 'sawtooth';
      osc2.frequency.value = freq * 1.003;

      // Vibrato
      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      lfo.frequency.value = 5.5;
      lfoGain.gain.value = freq * 0.006;
      lfo.connect(lfoGain);
      lfoGain.connect(osc1.frequency);
      lfoGain.connect(osc2.frequency);

      filter.type = 'lowpass';
      filter.frequency.value = 2200;
      filter.Q.value = 0.7;

      env.gain.setValueAtTime(0, startTime);
      env.gain.linearRampToValueAtTime(0.7, startTime + attack);
      env.gain.setValueAtTime(0.7, startTime + dur - release);
      env.gain.linearRampToValueAtTime(0, startTime + dur);

      osc1.connect(filter);
      osc2.connect(filter);
      filter.connect(env);
      env.connect(dest);

      const nodes = [osc1, osc2, lfo];
      nodes.forEach(n => { n.start(startTime); n.stop(startTime + dur + 0.01); });
      nodes.forEach(n => {
        scheduledSources.push(n);
        n.onended = () => {
          const i = scheduledSources.indexOf(n);
          if (i >= 0) scheduledSources.splice(i, 1);
        };
      });
    }

    function createWorker() {
      const blob = new Blob([`
        let iv = null;
        self.onmessage = function(e) {
          if (e.data === 'start' && !iv) iv = setInterval(function() { postMessage('tick'); }, 25);
          else if (e.data === 'stop') { clearInterval(iv); iv = null; }
        };
      `], { type: 'application/javascript' });
      return new Worker(URL.createObjectURL(blob));
    }

    function ensureWorker() {
      if (!worker) {
        worker = createWorker();
        worker.onmessage = () => {
          if (m.playing) m_scheduler();
          if (u.playing) u_scheduler();
        };
      }
    }

    // Build dots positioned by time fraction
    function buildDots(trackId, positions, layerClass, idPrefix) {
      const track = document.getElementById(trackId);
      const label = document.createElement('span');
      label.className = 'beat-track-label ' + layerClass;
      label.textContent = layerClass === 'l4' ? '4/4' : 'pat.';
      track.appendChild(label);
      positions.forEach((pos, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot ' + layerClass;
        dot.id = idPrefix + i;
        dot.style.left = (pos * 100) + '%';
        track.appendChild(dot);
      });
    }

    function buildLayerConfig(containerId, labelClass, defaultKey, onSelect, onMute, extraVoices) {
      const container = document.getElementById(containerId);
      const label = document.createElement('span');
      label.className = 'layer-config-label ' + labelClass;
      label.textContent = labelClass === 'l4' ? '4' : '3';
      container.appendChild(label);
      const keys = Object.keys(voices).concat(extraVoices || []);
      const btns = {};
      keys.forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'sound-btn' + (key === defaultKey ? ' active' : '');
        btn.textContent = key === 'cello' ? 'cello' : voices[key].name;
        btn.addEventListener('click', () => {
          Object.values(btns).forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          onSelect(key);
          if (!audioCtx) initAudio();
          if (audioCtx.state === 'suspended') audioCtx.resume();
          if (key === 'cello') playCello(0, audioCtx.currentTime, 4.0, previewNode);
          else playBuffer(key, audioCtx.currentTime, previewNode);
        });
        btns[key] = btn;
        container.appendChild(btn);
      });
      const muteBtn = document.createElement('button');
      muteBtn.className = 'mute-btn';
      muteBtn.textContent = 'mute';
      muteBtn.addEventListener('click', () => {
        const muted = onMute();
        muteBtn.classList.toggle('muted', muted);
      });
      container.appendChild(muteBtn);
    }

    function highlightDot(idPrefix, index, count) {
      for (let i = 0; i < count; i++) {
        const el = document.getElementById(idPrefix + i);
        if (i === index) el.classList.add('active');
        else el.classList.remove('active');
      }
    }

    // === Mahler 3-against-4 ===
    const M_POS4 = [0, 0.25, 0.5, 0.75];
    const M_POS3 = [0, 1/3, 2/3];

    buildDots('m-track4', M_POS4, 'l4', 'm4-');
    buildDots('m-track3', M_POS3, 'l3', 'm3-');

    const m = { playing: false, bpm: 80, v4: 'low', v3: 'high', m4: false, m3: false };
    let m_s4 = 0, m_s3 = 0, m_startTime = 0, m_beatQueue = [], m_animFrame = null, m_d4 = null, m_d3 = null;

    buildLayerConfig('m-config4', 'l4', 'low',  k => { m.v4 = k; }, () => { m.m4 = !m.m4; return m.m4; });
    buildLayerConfig('m-config3', 'l3', 'high', k => { m.v3 = k; }, () => { m.m3 = !m.m3; return m.m3; });

    function m_scheduler() {
      const L = (60 / m.bpm) * 4;
      while (true) {
        const mi = Math.floor(m_s4 / 4), idx = m_s4 % 4;
        const t = m_startTime + mi * L + M_POS4[idx] * L;
        if (t >= audioCtx.currentTime + SCHEDULE_AHEAD) break;
        if (!m.m4) playBuffer(m.v4, t, layer4Node);
        m_beatQueue.push({ time: t, layer: 4, index: idx });
        m_s4++;
      }
      while (true) {
        const mi = Math.floor(m_s3 / 3), idx = m_s3 % 3;
        const t = m_startTime + mi * L + M_POS3[idx] * L;
        if (t >= audioCtx.currentTime + SCHEDULE_AHEAD) break;
        if (!m.m3) playBuffer(m.v3, t, layer3Node);
        m_beatQueue.push({ time: t, layer: 3, index: idx });
        m_s3++;
      }
    }

    function m_visuals() {
      if (!m.playing) return;
      const now = audioCtx.currentTime;
      const L = (60 / m.bpm) * 4;
      let a4 = -1, a3 = -1;
      while (m_beatQueue.length && m_beatQueue[0].time <= now) {
        const b = m_beatQueue.shift();
        if (b.layer === 4) a4 = b.index; else a3 = b.index;
      }
      if (a4 >= 0) { highlightDot('m4-', a4, 4); clearTimeout(m_d4); m_d4 = setTimeout(() => highlightDot('m4-', -1, 4), (L/4)*400); }
      if (a3 >= 0) { highlightDot('m3-', a3, 3); clearTimeout(m_d3); m_d3 = setTimeout(() => highlightDot('m3-', -1, 3), (L/3)*400); }
      m_animFrame = requestAnimationFrame(m_visuals);
    }

    function m_start() {
      if (u.playing) u_stop();
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      m_s4 = 0; m_s3 = 0; m_beatQueue = [];
      m_startTime = audioCtx.currentTime + 0.05;
      ensureWorker(); worker.postMessage('start');
      m.playing = true;
      m_animFrame = requestAnimationFrame(m_visuals);
      document.getElementById('m-start-btn').textContent = 'stop';
    }

    function m_stop() {
      m.playing = false;
      if (!u.playing && worker) worker.postMessage('stop');
      cancelAnimationFrame(m_animFrame);
      clearTimeout(m_d4); clearTimeout(m_d3);
      cancelScheduled(); m_beatQueue = [];
      document.getElementById('m-start-btn').textContent = 'start';
      highlightDot('m4-', -1, 4); highlightDot('m3-', -1, 3);
    }

    document.getElementById('m-start-btn').addEventListener('click', () => { if (!m.playing) m_start(); else m_stop(); });
    document.getElementById('m-bpm').addEventListener('input', () => { document.getElementById('m-bpm-display').textContent = parseInt(document.getElementById('m-bpm').value, 10); });
    document.getElementById('m-bpm').addEventListener('change', () => {
      m.bpm = parseInt(document.getElementById('m-bpm').value, 10);
      if (m.playing) { cancelScheduled(); m_beatQueue = []; m_s4 = 0; m_s3 = 0; m_startTime = audioCtx.currentTime + 0.05; }
    });

    // === Umoja m. 23 ===
    const U_POS4 = [0, 0.25, 0.5, 0.75];
    const U_POS3 = [0, 0.25, 0.625];

    buildDots('u-track4', U_POS4, 'l4', 'u4-');
    buildDots('u-track3', U_POS3, 'l3', 'u3-');

    const u = { playing: false, bpm: 44, v4: 'low', v3: 'high', m4: false, m3: false };
    let u_s4 = 0, u_s3 = 0, u_startTime = 0, u_beatQueue = [], u_animFrame = null, u_d4 = null, u_d3 = null;

    buildLayerConfig('u-config4', 'l4', 'low',  k => { u.v4 = k; }, () => { u.m4 = !u.m4; return u.m4; });
    buildLayerConfig('u-config3', 'l3', 'cello', k => { u.v3 = k; }, () => { u.m3 = !u.m3; return u.m3; }, ['cello']);

    function u_scheduler() {
      const L = (60 / u.bpm) * 4;
      while (true) {
        const mi = Math.floor(u_s4 / 4), idx = u_s4 % 4;
        const t = u_startTime + mi * L + U_POS4[idx] * L;
        if (t >= audioCtx.currentTime + SCHEDULE_AHEAD) break;
        if (!u.m4) playBuffer(u.v4, t, layer4Node);
        u_beatQueue.push({ time: t, layer: 4, index: idx });
        u_s4++;
      }
      while (true) {
        const mi = Math.floor(u_s3 / 3), idx = u_s3 % 3;
        const t = u_startTime + mi * L + U_POS3[idx] * L;
        if (t >= audioCtx.currentTime + SCHEDULE_AHEAD) break;
        if (!u.m3) {
          if (u.v3 === 'cello') playCello(idx, t, L, layer3Node);
          else playBuffer(u.v3, t, layer3Node);
        }
        u_beatQueue.push({ time: t, layer: 3, index: idx });
        u_s3++;
      }
    }

    function u_visuals() {
      if (!u.playing) return;
      const now = audioCtx.currentTime;
      const L = (60 / u.bpm) * 4;
      let a4 = -1, a3 = -1;
      while (u_beatQueue.length && u_beatQueue[0].time <= now) {
        const b = u_beatQueue.shift();
        if (b.layer === 4) a4 = b.index; else a3 = b.index;
      }
      if (a4 >= 0) { highlightDot('u4-', a4, 4); clearTimeout(u_d4); u_d4 = setTimeout(() => highlightDot('u4-', -1, 4), (L/4)*400); }
      if (a3 >= 0) { highlightDot('u3-', a3, 3); clearTimeout(u_d3); u_d3 = setTimeout(() => highlightDot('u3-', -1, 3), (L*0.375)*400); }
      u_animFrame = requestAnimationFrame(u_visuals);
    }

    function u_start() {
      if (m.playing) m_stop();
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      u_s4 = 0; u_s3 = 0; u_beatQueue = [];
      u_startTime = audioCtx.currentTime + 0.05;
      ensureWorker(); worker.postMessage('start');
      u.playing = true;
      u_animFrame = requestAnimationFrame(u_visuals);
      document.getElementById('u-start-btn').textContent = 'stop';
    }

    function u_stop() {
      u.playing = false;
      if (!m.playing && worker) worker.postMessage('stop');
      cancelAnimationFrame(u_animFrame);
      clearTimeout(u_d4); clearTimeout(u_d3);
      cancelScheduled(); u_beatQueue = [];
      document.getElementById('u-start-btn').textContent = 'start';
      highlightDot('u4-', -1, 4); highlightDot('u3-', -1, 3);
    }

    document.getElementById('u-start-btn').addEventListener('click', () => { if (!u.playing) u_start(); else u_stop(); });
    document.getElementById('u-bpm').addEventListener('input', () => { document.getElementById('u-bpm-display').textContent = parseInt(document.getElementById('u-bpm').value, 10); });
    document.getElementById('u-bpm').addEventListener('change', () => {
      u.bpm = parseInt(document.getElementById('u-bpm').value, 10);
      if (u.playing) { cancelScheduled(); u_beatQueue = []; u_s4 = 0; u_s3 = 0; u_startTime = audioCtx.currentTime + 0.05; }
    });
  </script>
</body>
</html>
