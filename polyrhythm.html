<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>polyrhythm practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="song.css">
  <style>
    .back {
      position: fixed;
      top: 1rem;
      left: 1rem;
      font-size: 1rem;
      color: #666;
      text-decoration: none;
    }
    .back:hover {
      color: #d8d8ff;
    }
    .subtitle {
      font-size: 1rem;
      font-style: italic;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-top: -1rem;
    }
    .beat-row {
      display: flex;
      gap: 1rem;
      align-items: center;
      justify-content: center;
      margin: 0.5rem 0;
    }
    .beat-row-label {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      width: 2em;
      text-align: right;
    }
    .beat {
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      border: 1px solid #666;
      transition: background 0.05s, border-color 0.05s;
    }
    .beat.layer4 {
      border-color: #8cb4d8;
    }
    .beat.layer4.active {
      background: #8cb4d8;
      border-color: #8cb4d8;
    }
    .beat.layer3 {
      border-color: #d8a08c;
    }
    .beat.layer3.active {
      background: #d8a08c;
      border-color: #d8a08c;
    }
    .controls {
      margin-top: 1.5rem;
    }
    .layer-config {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }
    .layer-config-label {
      font-size: 1rem;
      width: 2em;
      text-align: right;
      color: rgba(255,255,255,0.5);
    }
    .layer-config-label.l4 { color: #8cb4d8; }
    .layer-config-label.l3 { color: #d8a08c; }
    .sound-btn {
      font-size: 0.85rem;
      padding: 0.3em 0.7em;
      color: #666;
      border-color: #444;
    }
    .sound-btn.active {
      color: #fff;
      border-color: #fff;
    }
    .sound-btn.muted {
      color: #444;
      border-color: #333;
      text-decoration: line-through;
    }
    .mute-btn {
      font-size: 0.85rem;
      padding: 0.3em 0.5em;
      color: #666;
      border-color: #444;
    }
    .mute-btn.muted {
      color: #c66;
      border-color: #c66;
    }
    .tempo-display {
      font-size: 1.4rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← back</a>

  <div class="title">
    <span>polyrhythm</span>
    <img src="feather.svg" alt="" class="feather">
  </div>
  <p class="subtitle">3 against 4 — mahler 2, m. 250</p>

  <div class="beat-row">
    <span class="beat-row-label">4</span>
    <div class="beat layer4" id="b4-0"></div>
    <div class="beat layer4" id="b4-1"></div>
    <div class="beat layer4" id="b4-2"></div>
    <div class="beat layer4" id="b4-3"></div>
  </div>
  <div class="beat-row">
    <span class="beat-row-label">3</span>
    <div class="beat layer3" id="b3-0"></div>
    <div class="beat layer3" id="b3-1"></div>
    <div class="beat layer3" id="b3-2"></div>
  </div>

  <div class="controls">
    <div class="layer-config" id="config4"></div>
    <div class="layer-config" id="config3"></div>
    <div style="margin-top:1rem; text-align:center;">
      <div class="tempo-display"><span id="bpm-display">80</span> bpm</div>
      <input id="bpm" type="range" min="40" max="200" step="1" value="80">
    </div>
    <div style="text-align:center; margin-top:1rem;">
      <button id="start-btn">start</button>
    </div>
  </div>

  <script>
    const voices = {
      click:    { name: 'click',    wave: 'square',   freq: 800,  gain: 0.3, decay: 0.05 },
      high:     { name: 'high',     wave: 'square',   freq: 1400, gain: 0.25, decay: 0.04 },
      bell:     { name: 'bell',     wave: 'sine',     freq: 523,  gain: 0.4, decay: 0.3 },
      low:      { name: 'low',      wave: 'sine',     freq: 262,  gain: 0.4, decay: 0.2 },
      snap:     { name: 'snap',     wave: 'triangle', freq: 2000, gain: 0.25, decay: 0.03 },
      drum:     { name: 'drum',     wave: 'square',   freq: 200,  gain: 0.4, decay: 0.08 }
    };

    let audioCtx = null;
    let layer4Node = null;
    let layer3Node = null;
    let previewNode = null;
    let buffers = {};
    let playing = false;
    let bpm = 80;
    let worker = null;
    let animFrame = null;
    let layer4Voice = 'low';
    let layer3Voice = 'high';
    let layer4Muted = false;
    let layer3Muted = false;

    let nextBeat4Time = 0;
    let nextBeat3Time = 0;
    let currentBeat4 = 0;
    let currentBeat3 = 0;

    // Visual event queue: [{time, layer, index}]
    let beatQueue = [];

    const SCHEDULE_AHEAD = 0.12;

    const startBtn = document.getElementById('start-btn');
    const bpmSlider = document.getElementById('bpm');
    const bpmDisplay = document.getElementById('bpm-display');

    // Web Worker ticker via inline Blob
    function createWorker() {
      const blob = new Blob([`
        let interval = null;
        self.onmessage = function(e) {
          if (e.data === 'start') {
            interval = setInterval(function() { postMessage('tick'); }, 25);
          } else if (e.data === 'stop') {
            clearInterval(interval);
            interval = null;
          }
        };
      `], { type: 'application/javascript' });
      const w = new Worker(URL.createObjectURL(blob));
      w.onmessage = function() { if (playing) scheduler(); };
      return w;
    }

    function renderBuffer(voice) {
      const sr = audioCtx.sampleRate;
      const len = Math.ceil(sr * (voice.decay + 0.02));
      const buf = audioCtx.createBuffer(1, len, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        const t = i / sr;
        const phase = voice.freq * t * 2 * Math.PI;
        let sample;
        if (voice.wave === 'sine') sample = Math.sin(phase);
        else if (voice.wave === 'square') sample = Math.sin(phase) >= 0 ? 1 : -1;
        else sample = 2 * Math.abs(2 * (t * voice.freq % 1) - 1) - 1;
        const env = t < voice.decay
          ? voice.gain * Math.pow(0.001 / voice.gain, t / voice.decay)
          : 0;
        data[i] = sample * env;
      }
      return buf;
    }

    function initAudio() {
      audioCtx = new AudioContext();

      layer4Node = audioCtx.createGain();
      layer4Node.gain.value = 0.5;
      layer4Node.connect(audioCtx.destination);

      layer3Node = audioCtx.createGain();
      layer3Node.gain.value = 0.5;
      layer3Node.connect(audioCtx.destination);

      previewNode = audioCtx.createGain();
      previewNode.gain.value = 0.5;
      previewNode.connect(audioCtx.destination);

      Object.keys(voices).forEach(key => {
        buffers[key] = renderBuffer(voices[key]);
      });

      audioCtx.onstatechange = () => {
        if (audioCtx.state === 'interrupted' || audioCtx.state === 'suspended') {
          if (playing) stop();
        }
      };
    }

    function playBuffer(key, time, dest) {
      const src = audioCtx.createBufferSource();
      src.buffer = buffers[key];
      src.connect(dest);
      src.start(time);
    }

    function buildLayerConfig(containerId, labelClass, defaultKey, onSelect, onMute) {
      const container = document.getElementById(containerId);

      const label = document.createElement('span');
      label.className = 'layer-config-label ' + labelClass;
      label.textContent = labelClass === 'l4' ? '4' : '3';
      container.appendChild(label);

      const btns = {};
      Object.keys(voices).forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'sound-btn' + (key === defaultKey ? ' active' : '');
        btn.textContent = voices[key].name;
        btn.addEventListener('click', () => {
          Object.values(btns).forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          onSelect(key);
          if (!audioCtx) initAudio();
          if (audioCtx.state === 'suspended') audioCtx.resume();
          playBuffer(key, audioCtx.currentTime, previewNode);
        });
        btns[key] = btn;
        container.appendChild(btn);
      });

      const muteBtn = document.createElement('button');
      muteBtn.className = 'mute-btn';
      muteBtn.textContent = 'mute';
      muteBtn.addEventListener('click', () => {
        const muted = onMute();
        muteBtn.classList.toggle('muted', muted);
      });
      container.appendChild(muteBtn);
    }

    buildLayerConfig('config4', 'l4', 'low',
      key => { layer4Voice = key; },
      () => { layer4Muted = !layer4Muted; return layer4Muted; }
    );
    buildLayerConfig('config3', 'l3', 'high',
      key => { layer3Voice = key; },
      () => { layer3Muted = !layer3Muted; return layer3Muted; }
    );

    function highlightBeat(layer, index, count) {
      for (let i = 0; i < count; i++) {
        const el = document.getElementById('b' + layer + '-' + i);
        if (i === index) el.classList.add('active');
        else el.classList.remove('active');
      }
    }

    function scheduler() {
      const L = (60 / bpm) * 4;
      const beat4Interval = L / 4;
      const beat3Interval = L / 3;

      while (nextBeat4Time < audioCtx.currentTime + SCHEDULE_AHEAD) {
        if (!layer4Muted) playBuffer(layer4Voice, nextBeat4Time, layer4Node);
        beatQueue.push({ time: nextBeat4Time, layer: 4, index: currentBeat4 });
        currentBeat4 = (currentBeat4 + 1) % 4;
        nextBeat4Time += beat4Interval;
      }

      while (nextBeat3Time < audioCtx.currentTime + SCHEDULE_AHEAD) {
        if (!layer3Muted) playBuffer(layer3Voice, nextBeat3Time, layer3Node);
        beatQueue.push({ time: nextBeat3Time, layer: 3, index: currentBeat3 });
        currentBeat3 = (currentBeat3 + 1) % 3;
        nextBeat3Time += beat3Interval;
      }
    }

    function updateVisuals() {
      if (!playing) return;
      const now = audioCtx.currentTime;
      const beat4Interval = (60 / bpm);
      const beat3Interval = (60 / bpm) * 4 / 3;

      let active4 = -1;
      let active3 = -1;

      // Consume queue: activate beats whose time has arrived
      while (beatQueue.length > 0 && beatQueue[0].time <= now) {
        const b = beatQueue.shift();
        if (b.layer === 4) active4 = b.index;
        else active3 = b.index;
      }

      // Peek ahead for beats not yet arrived — keep previous highlight
      // (only update if we consumed something this frame)
      if (active4 >= 0) {
        highlightBeat(4, active4, 4);
        clearTimeout(dim4Timer);
        dim4Timer = setTimeout(() => highlightBeat(4, -1, 4), beat4Interval * 400);
      }
      if (active3 >= 0) {
        highlightBeat(3, active3, 3);
        clearTimeout(dim3Timer);
        dim3Timer = setTimeout(() => highlightBeat(3, -1, 3), beat3Interval * 400);
      }

      animFrame = requestAnimationFrame(updateVisuals);
    }

    let dim4Timer = null;
    let dim3Timer = null;

    function start() {
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      currentBeat4 = 0;
      currentBeat3 = 0;
      beatQueue = [];
      nextBeat4Time = audioCtx.currentTime + 0.05;
      nextBeat3Time = audioCtx.currentTime + 0.05;

      if (!worker) worker = createWorker();
      worker.postMessage('start');
      playing = true;
      animFrame = requestAnimationFrame(updateVisuals);
      startBtn.textContent = 'stop';
    }

    function stop() {
      playing = false;
      if (worker) worker.postMessage('stop');
      cancelAnimationFrame(animFrame);
      clearTimeout(dim4Timer);
      clearTimeout(dim3Timer);
      beatQueue = [];
      startBtn.textContent = 'start';
      highlightBeat(4, -1, 4);
      highlightBeat(3, -1, 3);
    }

    startBtn.addEventListener('click', () => {
      if (!playing) start();
      else stop();
    });

    bpmSlider.addEventListener('input', () => {
      bpm = parseInt(bpmSlider.value, 10);
      bpmDisplay.textContent = bpm;
    });
  </script>
</body>
</html>
